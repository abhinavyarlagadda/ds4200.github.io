<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Daily CO Concentration Over Time by City (2025)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    h2 {
      margin-bottom: 4px;
    }

    p {
      margin-top: 0;
      margin-bottom: 20px;
      color: #555;
    }

    .tooltip {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      padding: 8px 10px;
      border-radius: 5px;
      pointer-events: none;
      font-size: 12px;
      opacity: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .axis-label {
      font-size: 13px;
      font-weight: 500;
    }

    .legend text {
      font-size: 12px;
      alignment-baseline: middle;
    }
  </style>
</head>
<body>

<h2>Daily CO Concentration Over Time by City (2025)</h2>
<p>Daily average CO across monitors in six major U.S. cities</p>

<div id="chart"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const margin = { top: 30, right: 170, bottom: 60, left: 80 };
const svgWidth = 900;
const svgHeight = 420;
const width = svgWidth - margin.left - margin.right;
const height = svgHeight - margin.top - margin.bottom;

const cityOrder = ["Boston", "New York", "Washington, DC", "Los Angeles", "Houston", "Atlanta"];
const cities = ["Boston", "New York", "Washington", "Los Angeles", "Houston", "Atlanta"];

const parseDate = d3.timeParse("%Y-%m-%d");
const formatDate = d3.timeFormat("%b %d, %Y");

const color = d3.scaleOrdinal()
  .domain(cityOrder)
  .range(d3.schemeCategory10);

function labelCity(name) {
  if (!name) return null;
  name = String(name);

  if (name.includes("Boston")) return "Boston";
  if (name.includes("New York")) return "New York";
  if (name.includes("Washington")) return "Washington, DC";
  if (name.includes("Los Angeles")) return "Los Angeles";
  if (name.includes("Houston")) return "Houston";
  if (name.includes("Atlanta")) return "Atlanta";
  return null;
}

const svg = d3.select("#chart")
  .append("svg")
  .attr("width", svgWidth)
  .attr("height", svgHeight);

const chart = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

const tooltip = d3.select("#tooltip");

d3.csv("co.csv").then(function(data) {
  data.forEach(function(d) {
    d.date = parseDate(d["Date Local"]);
    d.co = +d["Arithmetic Mean"];
    d.aqi = d["AQI"] === "" ? null : +d["AQI"];
  });

  const filtered = data
    .filter(function(d) {
      return (
        d["City Name"] &&
        cities.some(function(city) {
          return d["City Name"].toLowerCase().includes(city.toLowerCase());
        }) &&
        d.date &&
        !isNaN(d.co)
      );
    })
    .map(function(d) {
      return {
        date: d.date,
        City: labelCity(d["City Name"]),
        co: d.co,
        aqi: d.aqi
      };
    })
    .filter(function(d) {
      return d.City !== null;
    });

  const grouped = d3.rollups(
    filtered,
    function(v) {
      return {
        co: d3.mean(v, d => d.co),
        aqi: d3.mean(v, d => d.aqi == null ? undefined : d.aqi)
      };
    },
    d => +d.date,
    d => d.City
  );

  const finalData = [];
  grouped.forEach(function(dateGroup) {
    const dateVal = dateGroup[0];
    const cityGroups = dateGroup[1];

    cityGroups.forEach(function(cityGroup) {
      const city = cityGroup[0];
      const vals = cityGroup[1];

      finalData.push({
        date: new Date(+dateVal),
        City: city,
        co: vals.co,
        aqi: vals.aqi
      });
    });
  });

  finalData.sort(function(a, b) {
    return d3.ascending(a.date, b.date);
  });

  const x = d3.scaleTime()
    .domain(d3.extent(finalData, d => d.date))
    .range([0, width]);

  const y = d3.scaleLinear()
    .domain(d3.extent(finalData, d => d.co))
    .nice()
    .range([height, 0]);

  const xAxis = d3.axisBottom(x)
    .ticks(d3.timeMonth.every(1))
    .tickFormat(d3.timeFormat("%b"));

  const yAxis = d3.axisLeft(y);

  chart.append("g")
    .attr("transform", `translate(0,${height})`)
    .call(xAxis);

  chart.append("g")
    .call(yAxis);

  chart.append("text")
    .attr("class", "axis-label")
    .attr("x", width / 2)
    .attr("y", height + 45)
    .attr("text-anchor", "middle")
    .text("Date");

  chart.append("text")
    .attr("class", "axis-label")
    .attr("transform", "rotate(-90)")
    .attr("x", -height / 2)
    .attr("y", -55)
    .attr("text-anchor", "middle")
    .text("Daily Avg CO (ppm)");


  const pointsGroup = chart.append("g");

  pointsGroup.selectAll("circle.point")
    .data(finalData)
    .enter()
    .append("circle")
    .attr("class", d => `point city-${d.City.replace(/[^a-zA-Z]/g, "")}`)
    .attr("cx", d => x(d.date))
    .attr("cy", d => y(d.co))
    .attr("r", 4.5)
    .attr("fill", d => color(d.City))
    .attr("opacity", 0.75)
    .on("mouseover", function(event, d) {
      if (!activeSet.has(d.City)) return;
      tooltip
        .style("opacity", 1)
        .html(
          `<strong>Date:</strong> ${formatDate(d.date)}<br>
           <strong>City:</strong> ${d.City}<br>
           <strong>CO (ppm):</strong> ${d.co.toFixed(3)}<br>
           <strong>Avg AQI:</strong> ${d.aqi == null || isNaN(d.aqi) ? "N/A" : d.aqi.toFixed(1)}`
        );
    })
    .on("mousemove", function(event) {
      tooltip
        .style("left", (event.pageX + 12) + "px")
        .style("top", (event.pageY - 28) + "px");
    })
    .on("mouseout", function() {
      tooltip.style("opacity", 0);
    });

  const legend = svg.append("g")
    .attr("class", "legend")
    .attr("transform", `translate(${svgWidth - margin.right + 30}, ${margin.top + 10})`);

  cityOrder.forEach(function(city, i) {
    const row = legend.append("g")
      .attr("transform", `translate(0, ${i * 24})`)
      .on("click", function() {
        const isActive = activeSet.has(city);
        if (isActive) {
          activeSet.delete(city);
        } else {
          activeSet.add(city);
        }
        const nowActive = activeSet.has(city);

        d3.select(this).select("circle")
          .attr("opacity", nowActive ? 1 : 0.2);
        d3.select(this).select("text")
          .attr("opacity", nowActive ? 1 : 0.35);

        const cls = `.city-${city.replace(/[^a-zA-Z]/g, "")}`;
        pointsGroup.selectAll(cls)
          .transition().duration(200)
          .attr("opacity", nowActive ? 0.75 : 0)
          .attr("pointer-events", nowActive ? "all" : "none");
      });

    row.append("circle")
      .attr("cx", 0)
      .attr("cy", 0)
      .attr("r", 5)
      .attr("fill", color(city));

    row.append("text")
      .attr("x", 12)
      .attr("y", 0)
      .text(city);
  });
});
</script>

</body>
</html>
